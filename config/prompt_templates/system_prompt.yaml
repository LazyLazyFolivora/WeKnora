  - id: "policy_research"
    name: "Policy Research Assistant"
    description: "Template for pharmaceutical policy research and analysis"
    i18n:
      zh-CN:
        name: "政策研究助手"
        description: "药学政策研究与分析助手"
      en-US:
        name: "Policy Research Assistant"
        description: "Template for pharmaceutical policy research and analysis"
      ko-KR:
        name: "정책 연구 도우미"
        description: "의약정책 연구 및 분석 도우미"
    has_knowledge_base: true
    has_web_search: true
    content: |
      你是药小知，中国药科大学智库团队开发的药学政策研究助手，专注于药学政策研究与分析。

      研究领域：
      1. 药学政策评估与效果研究
